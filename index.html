<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#060b14" id="themeColor">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>Stock Tracker v7</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{--bg:#060b14;--card:#0e1525;--card2:#080e1a;--ac:#00e8a2;--acD:rgba(0,232,162,.1);--red:#ff4d6a;--redD:rgba(255,77,106,.1);--amb:#ffb347;--ambD:rgba(255,179,71,.1);--blu:#4dabf7;--bluD:rgba(77,171,247,.1);--pur:#a29bfe;--purD:rgba(162,155,254,.12);--tx:#e4e8f1;--t2:#7b8db5;--t3:#3d4f6f;--bd:#1a2744;--hdbg:linear-gradient(180deg,#060b14 85%,transparent);--navbg:linear-gradient(0deg,#060b14 70%,transparent)}
.light{--bg:#f0f2f5;--card:#ffffff;--card2:#f5f7fa;--tx:#1a1a2e;--t2:#555;--t3:#999;--bd:#dde1e6;--hdbg:linear-gradient(180deg,#f0f2f5 85%,transparent);--navbg:linear-gradient(0deg,#f0f2f5 70%,transparent)}
.light .hd{background:var(--hdbg)}.light .nav{background:var(--navbg)}
.light .inp{background:#fff;border-color:#dde1e6;color:#1a1a2e}
.light .stat{background:#f5f7fa}
.light .ticker-wrap{background:#fff;border-color:#dde1e6}
.light .idx{background:#fff;border-color:#dde1e6}
.light .sr div{border-color:#eee}
html,body{height:100%;background:var(--bg);color:var(--tx);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;-webkit-user-select:none;user-select:none;overscroll-behavior:none}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
input{font-family:inherit;outline:none}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
@keyframes ld{0%{width:10%}50%{width:80%}100%{width:10%}}
@keyframes tick{from{transform:translateX(0)}to{transform:translateX(-50%)}}

.hd{padding:12px 16px 0;position:sticky;top:0;z-index:20;background:var(--hdbg);backdrop-filter:blur(12px)}
.hd h1{font-size:18px;font-weight:800;background:linear-gradient(90deg,#00e8a2,#4dabf7);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.hd p{font-size:9px;color:var(--t3);margin-top:1px}
.hd-row{display:flex;justify-content:space-between;align-items:center}
.hd-btns{display:flex;gap:4px}
.hd-btn{width:28px;height:28px;border-radius:8px;background:var(--card);border:1px solid var(--bd);display:flex;align-items:center;justify-content:center;font-size:13px}

/* Ticker strip */
.ticker-wrap{overflow:hidden;margin:6px 0 2px;background:var(--card);border-radius:8px;padding:6px 0;border:1px solid var(--bd)}
.ticker{display:flex;gap:16px;animation:tick 30s linear infinite;width:max-content}
.ticker:hover{animation-play-state:paused}
.ticker-item{display:flex;align-items:center;gap:6px;white-space:nowrap;padding:0 4px;cursor:pointer}
.ticker-item .tn{font-size:11px;font-weight:700;color:var(--t2)}
.ticker-item .tv{font-size:12px;font-weight:800}
.ticker-item .tc{font-size:10px;font-weight:700}
.ticker-item .tc.up{color:var(--ac)}.ticker-item .tc.dn{color:var(--red)}

.cd{margin:0 12px 8px;padding:14px;border-radius:14px;background:var(--card);border:1px solid var(--bd)}
.pl{display:inline-flex;padding:2px 7px;border-radius:6px;font-size:10px;font-weight:700}
.btn{padding:9px 16px;border-radius:10px;font-size:12px;font-weight:700;border:none;cursor:pointer}
.btn:active{opacity:.7}
.inp{width:100%;padding:9px 12px;border-radius:8px;border:1px solid var(--bd);background:#080e1a;color:var(--tx);font-size:13px}
.lb{display:block;font-size:10px;color:var(--t2);font-weight:600;margin-bottom:3px}
.nav{position:fixed;bottom:0;left:0;right:0;display:flex;gap:1px;padding:6px 6px;padding-bottom:calc(6px + env(safe-area-inset-bottom));background:var(--navbg);z-index:30}
.nav button{flex:1;padding:4px 0;border-radius:8px;font-size:8px;font-weight:700;display:flex;flex-direction:column;align-items:center;gap:1px}
.nav button span:first-child{font-size:14px}
.nav button.on{background:var(--acD);color:var(--ac)}
.nav button.on-p{background:var(--purD);color:var(--pur)}
.nav button.on-a{background:var(--ambD);color:var(--amb)}
.toast{position:fixed;top:16px;left:50%;transform:translateX(-50%);background:var(--card);color:var(--tx);padding:8px 18px;border-radius:10px;font-size:12px;font-weight:600;border:1px solid rgba(0,232,162,.2);z-index:100;box-shadow:0 8px 24px rgba(0,0,0,.5)}
.sr{background:var(--card);border:1px solid var(--bd);border-radius:8px;margin-top:4px;max-height:140px;overflow-y:auto}
.sr div{padding:6px 10px;font-size:11px;border-bottom:1px solid var(--bd)}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:6px}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:6px}
.stat{padding:8px;border-radius:8px;background:var(--card2);text-align:center}
.stat .sl{font-size:7px;color:var(--t3);font-weight:600}
.stat .sv{font-size:12px;font-weight:700;margin-top:1px}
.bar{display:flex;border-radius:6px;overflow:hidden;height:8px}
.back{background:transparent;color:var(--t2);border:1px solid var(--bd);margin-bottom:10px;font-size:11px;padding:5px 10px;border-radius:10px}
#content{padding:2px 0 72px}

/* Index cards */
.idx-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;padding:0 12px;margin-bottom:8px}
.idx{padding:10px;border-radius:10px;background:var(--card);border:1px solid var(--bd);cursor:pointer}
.idx:active{opacity:.8}
.idx .idx-n{font-size:11px;font-weight:700;color:var(--t2)}
.idx .idx-v{font-size:18px;font-weight:800;margin-top:2px}
.idx .idx-c{font-size:11px;font-weight:700;margin-top:1px}
.idx .idx-d{font-size:9px;color:var(--t3);margin-top:2px}
.idx.up{border-color:rgba(0,232,162,.15)}.idx.up .idx-c{color:var(--ac)}
.idx.dn{border-color:rgba(255,77,106,.15)}.idx.dn .idx-c{color:var(--red)}
.install-bar{margin:0 12px 8px;padding:12px;border-radius:12px;background:var(--card);border:1px solid var(--bd);display:flex;align-items:center;gap:10px}
.install-bar .ib-info{flex:1}.install-bar .ib-title{font-size:12px;font-weight:700}.install-bar .ib-sub{font-size:9px;color:var(--t3)}
.install-bar .ib-btn{padding:6px 14px;border-radius:8px;background:var(--ac);color:#060b14;font-size:11px;font-weight:700}
.install-bar .ib-x{font-size:14px;color:var(--t3);padding:4px}
.alert-triggered{position:fixed;top:50px;left:50%;transform:translateX(-50%);background:var(--amb);color:#000;padding:12px 20px;border-radius:12px;font-size:13px;font-weight:700;z-index:200;box-shadow:0 8px 32px rgba(0,0,0,.4);animation:ld 0.3s ease}
</style>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
</head>
<body>
<div class="hd">
  <div class="hd-row">
    <h1>📈 Stock Tracker <span style="font-size:10px;font-weight:400;color:var(--t3)">v7</span></h1>
    <div class="hd-btns">
      <button class="hd-btn" onclick="toggleTheme()" id="themeBtn">🌙</button>
    </div>
  </div>
  <p id="hdSub"></p>
</div>
<div id="ticker"></div>
<div id="content"></div>
<div id="toastEl" class="toast" style="display:none"></div>

<script>
const W=location.hostname==='localhost'?'http://localhost:8787':'https://stock-price.onerkk.workers.dev';
const W_AI='https://stock-ai.onerkk.workers.dev';
const SECTORS={"科技":"#00e8a2","金融":"#ffa502","傳產":"#a29bfe","生技":"#ff6b81","半導體":"#0984e3","能源":"#fdcb6e","消費":"#e17055","地產":"#636e72","ETF":"#74b9ff","其他":"#dfe6e9"};

// Global indices config
const IDX=[
  {s:'^TWII',n:'加權指數',flag:'🇹🇼'},
  {s:'^DJI',n:'道瓊指數',flag:'🇺🇸'},
  {s:'^IXIC',n:'那斯達克',flag:'🇺🇸'},
  {s:'^NDX',n:'那斯達克100',flag:'🇺🇸'},
  {s:'^SOX',n:'費城半導體',flag:'🔧'},
  {s:'DX-Y.NYB',n:'美元指數',flag:'💵'},
  {s:'^KS11',n:'韓國股市',flag:'🇰🇷'},
  {s:'^N225',n:'日經225',flag:'🇯🇵'},
  {s:'000001.SS',n:'上海股市',flag:'🇨🇳'},
  {s:'399001.SZ',n:'深圳成指',flag:'🇨🇳'},
];

let port=J('st-port',[]),txs=J('st-tx',[]),watch=J('st-watch',[]),sim=J('st-sim',{cash:SIM_CASH,holdings:[],startDate:ds(),startCash:SIM_CASH}),simTx=J('st-simtx',[]);

// 台股中文名稱（常用）
const TW_NAME={'2330':'台積電','2317':'鴻海','2454':'聯發科','2308':'台達電','2881':'富邦金','2882':'國泰金','2891':'中信金','2886':'兆豐金','2884':'玉山金','2880':'華南金','2303':'聯電','3711':'日月光投控','2412':'中華電','1301':'台塑','1303':'南亞','1326':'台化','2002':'中鋼','2912':'統一超','2885':'元大金','3008':'大立光','2357':'華碩','2382':'廣達','2395':'研華','6505':'台塑化','2207':'和泰車','5880':'合庫金','5876':'上海商銀','2892':'第一金','2887':'台新金','1101':'台泥','1102':'亞泥','2105':'正新','9910':'豐泰','2801':'彰銀','2301':'光寶科','3045':'台灣大','4904':'遠傳','2327':'國巨','3034':'聯詠','2379':'瑞昱','6669':'緯穎','3037':'欣興','2345':'智邦','5269':'祥碩','3661':'世芯','6415':'矽力','2603':'長榮','2615':'萬海','2609':'陽明','0050':'元大台灣50','0056':'元大高股息','00878':'國泰永續高股息','00919':'群益台灣精選高息','00929':'復華台灣科技優息','006208':'富邦台50','1605':'華新','1402':'遠東新','1216':'統一','2474':'可成','2049':'上銀','4938':'和碩','2347':'聯強','3231':'緯創','2356':'英業達','9904':'寶成','1590':'亞德客','2408':'南亞科','3443':'創意','2388':'威盛','5871':'中租-KY','2633':'台灣高鐵','2324':'仁寶','1476':'儒鴻','4743':'合一','6488':'環球晶','3529':'力旺','2727':'王品','2542':'興富發','2545':'遠雄','1504':'東元','6770':'力智','2376':'技嘉','6533':'晶心科','3653':'健策','6547':'高端疫苗','2404':'漢唐','1802':'台玻','2344':'華邦電','3706':'神達','2377':'微星','8046':'南電','6239':'力成','2383':'台光電','3044':'健鼎','2618':'長榮航','2610':'華航','9945':'潤泰新','6446':'藥華藥','1477':'聚陽','2105':'正新','3665':'貿聯-KY','8454':'富邦媒','2915':'潤泰全','3017':'奇鋐','6005':'群益證','2201':'裕隆','2204':'中華','3023':'信邦'};
function twName(sym){const code=sym.replace(/\.TW$/i,'');return TW_NAME[code]||null}
function dn(sym,name){return twName(sym)||twName(norm(sym))||name||sym}
let prices={},idxData={},view='market',sub=null,sel=null,aRes='',aLoad=false,lastUp=null,autoOn=true,searchRes=[],timer=null;
let chartData=null,chartRange='6mo',chartInterval='1d',chartLoading=false;
let alerts=J('st-alerts',[]);

function J(k,d){try{const v=localStorage.getItem(k);return v?JSON.parse(v):d}catch{return d}}
function SV(k,v){try{localStorage.setItem(k,JSON.stringify(v))}catch{};cloudSave()}
function ds(){return new Date().toISOString().slice(0,10)}
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,7)}
function ts(){return new Date().toLocaleTimeString('zh-TW',{hour:'2-digit',minute:'2-digit',second:'2-digit'})}
function fmt(n){return n==null||isNaN(n)?'--':Number(n).toLocaleString('zh-TW',{minimumFractionDigits:2,maximumFractionDigits:2})}
function fmtK(n){const a=Math.abs(n);if(a>=1e6)return(n/1e6).toFixed(1)+'M';if(a>=1e3)return(n/1e3).toFixed(1)+'K';return fmt(n)}
function fmtI(n){return Number(n).toLocaleString('zh-TW')}
function pct(n){return(n>=0?'+':'')+n.toFixed(2)+'%'}
function norm(s){s=s.toUpperCase().trim();if(/^\d{4,6}$/.test(s))return s+'.TW';return s}
function gp(s){return prices[norm(s)]?.price}
function toast(m){const el=document.getElementById('toastEl');el.textContent=m;el.style.display='block';setTimeout(()=>el.style.display='none',2e3)}

// ── Firebase Cloud Sync ──
const fbConfig={apiKey:"AIzaSyBKgqmsDIZgqf8nxWTDdTqVS01H0TIOCj4",authDomain:"myshift-a67f1.firebaseapp.com",projectId:"myshift-a67f1",storageBucket:"myshift-a67f1.firebasestorage.app",messagingSenderId:"779297515930",appId:"1:779297515930:web:7f5ba8992c5d5081a9f223"};
firebase.initializeApp(fbConfig);
const fbAuth=firebase.auth(),fbDb=firebase.firestore();
fbAuth.setPersistence(firebase.auth.Auth.Persistence.LOCAL);
let fbUser=null,_fbLoading=false;
fbAuth.onAuthStateChanged(u=>{fbUser=u;if(u)cloudLoad();render()});
function fbLogin(){const p=new firebase.auth.GoogleAuthProvider();fbAuth.signInWithPopup(p).catch(e=>{fbAuth.signInWithRedirect(p)})}
function fbLogout(){fbAuth.signOut().then(()=>{fbUser=null;render()})}
let _csTimer=null;
function cloudSave(){if(!fbUser||_fbLoading)return;clearTimeout(_csTimer);_csTimer=setTimeout(async()=>{try{await fbDb.collection("stockUsers").doc(fbUser.uid).set({port:JSON.stringify(port),txs:JSON.stringify(txs),watch:JSON.stringify(watch),sim:JSON.stringify(sim),simTx:JSON.stringify(simTx),alerts:JSON.stringify(alerts||[]),theme:isDark?'dark':'light',ts:firebase.firestore.FieldValue.serverTimestamp()},{merge:true})}catch(e){console.log("cloudSave err",e)}},1500)}
async function cloudLoad(){if(!fbUser)return;_fbLoading=true;try{const doc=await fbDb.collection("stockUsers").doc(fbUser.uid).get();if(doc.exists){const d=doc.data();if(d.port)port=JSON.parse(d.port);if(d.txs)txs=JSON.parse(d.txs);if(d.watch)watch=JSON.parse(d.watch);if(d.sim)sim=JSON.parse(d.sim);if(d.simTx)simTx=JSON.parse(d.simTx);if(d.alerts)alerts=JSON.parse(d.alerts);if(d.theme){isDark=d.theme==='dark';applyTheme()}SV_local('st-port',port);SV_local('st-tx',txs);SV_local('st-watch',watch);SV_local('st-sim',sim);SV_local('st-simtx',simTx);SV_local('st-alerts',alerts);toast('☁️ 已從雲端恢復')}_fbLoading=false;render()}catch(e){console.log("cloudLoad err",e);_fbLoading=false;render()}}
function SV_local(k,v){try{localStorage.setItem(k,JSON.stringify(v))}catch{}}
function fbBarHtml(){
  if(!fbUser)return`<div style="margin:0 12px 8px;padding:10px 14px;border-radius:12px;background:var(--card);border:1px solid var(--bd);display:flex;align-items:center;justify-content:space-between"><span style="font-size:11px;color:var(--t3)">☁️ 登入可雲端同步</span><button class="btn" style="background:#fff;color:#333;padding:6px 14px;border:1px solid var(--bd);font-size:11px;display:flex;align-items:center;gap:6px" onclick="fbLogin()"><img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" style="width:14px;height:14px">Google 登入</button></div>`;
  const pic=fbUser.photoURL?`<img src="${fbUser.photoURL}" referrerpolicy="no-referrer" style="width:20px;height:20px;border-radius:50%">`:'';
  return`<div style="margin:0 12px 8px;padding:10px 14px;border-radius:12px;background:var(--card);border:1px solid var(--bd);display:flex;align-items:center;justify-content:space-between"><div style="display:flex;align-items:center;gap:6px;font-size:11px;font-weight:600">${pic}<span>☁️ ${fbUser.displayName||fbUser.email}</span></div><button class="btn" style="background:var(--card2);color:var(--t2);padding:4px 10px;font-size:10px;border:1px solid var(--bd)" onclick="fbLogout()">登出</button></div>`;
}

// ── Fetch ──
async function fetchBatch(syms){
  if(!syms.length)return;
  try{const r=await fetch(W+'?s='+encodeURIComponent(syms.join(','))+'&action=batch');const d=await r.json();
    if(d&&typeof d==='object'&&!d.error)Object.entries(d).forEach(([k,v])=>{if(!v.error)prices[k]=v});lastUp=ts()}catch(e){console.error(e)}
}
async function fetchIdx(){
  const syms=IDX.map(i=>i.s);
  try{const r=await fetch(W+'?s='+encodeURIComponent(syms.join(','))+'&action=batch');const d=await r.json();
    if(d&&typeof d==='object')Object.entries(d).forEach(([k,v])=>{if(!v.error)idxData[k]=v})}catch(e){console.error(e)}
}
async function fetchOne(sym){
  try{const r=await fetch(W+'?s='+encodeURIComponent(norm(sym))+'&action=quote');const d=await r.json();
    if(d&&!d.error){prices[d.symbol]=d;lastUp=ts()}return d}catch{return null}
}
async function searchQ(q){
  try{const r=await fetch(W+'?s='+encodeURIComponent(q)+'&action=search');const d=await r.json();searchRes=Array.isArray(d)?d:[];updateSR()}catch{searchRes=[];updateSR()}
}
function updateSR(){
  const targets=['addSR','sbSR'];
  const fns={addSR:'fillAdd',sbSR:'fillSB'};
  targets.forEach(id=>{const el=document.getElementById(id);if(el){if(searchRes.length){el.innerHTML=`<div class="sr">${searchRes.map(r=>`<div onclick="${fns[id]}('${r.symbol}','${(r.name||'').replace(/'/g,'')}')""><b>${r.symbol}</b> <span style="color:var(--t2)">${r.name||''}</span></div>`).join('')}</div>`}else{el.innerHTML=''}}});
  // Also for watch and search pages
  const wEl=document.getElementById('wSR');
  if(wEl){if(searchRes.length){wEl.innerHTML=`<div class="sr">${searchRes.map(r=>`<div onclick="searchRes=[];addW('${r.symbol}','${(r.name||'').replace(/'/g,'')}');document.getElementById('wSR').innerHTML=''""><b>${r.symbol}</b> <span style="color:var(--t2)">${r.name||''}</span></div>`).join('')}</div>`}else wEl.innerHTML=''}
  const sEl=document.getElementById('sSR');
  if(sEl){if(searchRes.length){sEl.innerHTML=`<div class="sr">${searchRes.map(r=>`<div onclick="searchRes=[];document.getElementById('sSy').value='${r.symbol}';document.getElementById('sSR').innerHTML=''""><b>${r.symbol}</b> <span style="color:var(--t2)">${r.name||''}</span></div>`).join('')}</div>`}else sEl.innerHTML=''}
}
function allSyms(){const s=new Set();port.forEach(x=>s.add(norm(x.symbol)));watch.forEach(x=>s.add(norm(x.symbol)));sim.holdings.forEach(x=>s.add(norm(x.symbol)));return[...s]}
async function refreshAll(){await fetchIdx();const s=allSyms();if(s.length)await fetchBatch(s);render()}
function startAuto(){if(timer)clearInterval(timer);if(autoOn){refreshAll();timer=setInterval(refreshAll,15000)}}

// ── AI ──
// ── CHART ──
async function loadChart(sym,range,interval){
  chartLoading=true;chartData=null;chartRange=range;chartInterval=interval;render();
  try{const r=await fetch(W+'?s='+encodeURIComponent(norm(sym))+'&action=chart&range='+range+'&interval='+interval);const d=await r.json();if(d&&d.bars)chartData=d;else chartData=null}catch(e){chartData=null}
  chartLoading=false;render();
  setTimeout(()=>drawChart(),50);
}
function drawChart(){
  const cv=document.getElementById('chartCv');if(!cv||!chartData||!chartData.bars.length)return;
  const cx=cv.getContext('2d'),dpr=window.devicePixelRatio||1;
  const W2=cv.parentElement.clientWidth,H=260,VH=50;
  cv.width=W2*dpr;cv.height=H*dpr;cv.style.width=W2+'px';cv.style.height=H+'px';
  cx.scale(dpr,dpr);
  const bars=chartData.bars,len=bars.length;
  const bw=Math.max(1,Math.floor((W2-40)/len)-1),gap=1;
  const prices2=bars.map(b=>[b.h,b.l]).flat().filter(v=>v!=null);
  const pMax=Math.max(...prices2),pMin=Math.min(...prices2);
  const vMax=Math.max(...bars.map(b=>b.v))||1;
  const pH=H-VH-20,pTop=10;
  const py=(p)=>pTop+pH-(p-pMin)/(pMax-pMin)*pH;
  const vy=(v)=>H-v/vMax*VH;
  cx.fillStyle='#0e1525';cx.fillRect(0,0,W2,H);
  cx.strokeStyle='#1a2744';cx.lineWidth=0.5;
  for(let i=0;i<=4;i++){const y=pTop+pH*i/4;cx.beginPath();cx.moveTo(30,y);cx.lineTo(W2,y);cx.stroke();
    const pv=pMax-(pMax-pMin)*i/4;cx.fillStyle='#3d4f6f';cx.font='9px sans-serif';cx.textAlign='left';cx.fillText(pv>=1000?Math.round(pv).toLocaleString():pv.toFixed(2),0,y+3)}
  const ma=(n)=>{const r=[];for(let i=0;i<len;i++){if(i<n-1){r.push(null);continue}let s=0;for(let j=i-n+1;j<=i;j++)s+=bars[j].c;r.push(s/n)}return r};
  const drawMa=(n,color)=>{const m=ma(n);cx.strokeStyle=color;cx.lineWidth=1;cx.beginPath();let started=false;
    for(let i=0;i<len;i++){if(m[i]==null)continue;const x=30+(bw+gap)*i+bw/2,y=py(m[i]);if(!started){cx.moveTo(x,y);started=true}else cx.lineTo(x,y)}cx.stroke()};
  if(len>=5)drawMa(5,'#ffa502');if(len>=20)drawMa(20,'#4dabf7');if(len>=60)drawMa(60,'#a29bfe');
  for(let i=0;i<len;i++){
    const b=bars[i],x=30+(bw+gap)*i;const up=b.c>=b.o,col=up?'#00e8a2':'#ff4d6a';
    cx.fillStyle=up?'rgba(0,232,162,0.3)':'rgba(255,77,106,0.3)';cx.fillRect(x,vy(b.v),bw,H-vy(b.v));
    cx.strokeStyle=col;cx.lineWidth=1;cx.beginPath();cx.moveTo(x+bw/2,py(b.h));cx.lineTo(x+bw/2,py(b.l));cx.stroke();
    cx.fillStyle=col;const oY=py(b.o),cY=py(b.c);cx.fillRect(x,Math.min(oY,cY),bw,Math.max(1,Math.abs(cY-oY)));
  }
  cx.font='9px sans-serif';let lx=35;
  [{n:'MA5',c:'#ffa502'},{n:'MA20',c:'#4dabf7'},{n:'MA60',c:'#a29bfe'}].forEach(l=>{cx.fillStyle=l.c;cx.fillRect(lx,H-12,8,8);cx.fillStyle='#7b8db5';cx.fillText(l.n,lx+10,H-5);lx+=45});
}

function addStock(f){const sym=f.symbol.toUpperCase().trim();txs.unshift({id:uid(),symbol:sym,name:f.name,type:'BUY',shares:+f.shares,price:+f.price,date:f.date||ds(),note:f.note});SV('st-tx',txs);const ex=port.find(s=>s.symbol===sym);if(ex){const t2=ex.shares+(+f.shares);ex.avgCost=(ex.avgCost*ex.shares+(+f.price)*(+f.shares))/t2;ex.shares=t2}else port.push({symbol:sym,name:f.name,shares:+f.shares,avgCost:+f.price,sector:f.sector||'其他'});SV('st-port',port);toast('✅ '+sym);view='portfolio';fetchOne(sym);startAuto();render()}
function sellStock(sym,shares,price,note){const s=port.find(x=>x.symbol===sym);if(!s||shares>s.shares){toast('❌ 不足');return}const profit=(price-s.avgCost)*shares;txs.unshift({id:uid(),symbol:sym,name:s.name,type:'SELL',shares,price,date:ds(),note,profit});SV('st-tx',txs);s.shares-=shares;if(s.shares<=0)port=port.filter(x=>x.symbol!==sym);SV('st-port',port);toast('✅ 損益'+(profit>=0?'+':'')+fmt(profit));sub=null;render()}
function delStock(sym){port=port.filter(s=>s.symbol!==sym);SV('st-port',port);sel=null;view='portfolio';render()}
function addW(sym,name){const s=sym.toUpperCase();if(watch.find(w=>w.symbol===s))return;watch.push({symbol:s,name});SV('st-watch',watch);fetchOne(s);startAuto();render()}
function delW(sym){watch=watch.filter(w=>w.symbol!==sym);SV('st-watch',watch);render()}
function simBuy(sym,name,shares,price){if(shares*price>sim.cash){toast('❌ 資金不足');return}simTx.unshift({id:uid(),symbol:sym,name,type:'BUY',shares,price,date:ds(),time:ts()});SV('st-simtx',simTx);const ex=sim.holdings.find(h=>h.symbol===sym);if(ex){const t2=ex.shares+shares;ex.avgCost=(ex.avgCost*ex.shares+price*shares)/t2;ex.shares=t2}else sim.holdings.push({symbol:sym,name,shares,avgCost:price});sim.cash-=shares*price;SV('st-sim',sim);toast('🎮 '+sym);fetchOne(sym);startAuto();render()}
function simSell(sym,shares,price){const h=sim.holdings.find(x=>x.symbol===sym);if(!h||shares>h.shares){toast('❌');return}const profit=(price-h.avgCost)*shares;simTx.unshift({id:uid(),symbol:sym,name:h.name,type:'SELL',shares,price,date:ds(),time:ts(),profit});SV('st-simtx',simTx);h.shares-=shares;if(h.shares<=0)sim.holdings=sim.holdings.filter(x=>x.symbol!==sym);sim.cash+=shares*price;SV('st-sim',sim);render()}
function simReset(){sim={cash:SIM_CASH,holdings:[],startDate:ds(),startCash:SIM_CASH};simTx=[];SV('st-sim',sim);SV('st-simtx',simTx);toast('🔄');render()}

  const isIOS=/iPad|iPhone|iPod/.test(navigator.userAgent);
  const isStandalone=window.matchMedia('(display-mode:standalone)').matches||navigator.standalone;
  if(isStandalone||installHidden)return'';
  if(deferredPrompt)return`<div class="install-bar"><div style="font-size:24px">📱</div><div class="ib-info"><div class="ib-title">安裝到桌面</div><div class="ib-sub">一鍵開啟，像 App 一樣</div></div><button class="ib-btn" onclick="installApp()">安裝</button><button class="ib-x" onclick="hideInstall()">✕</button></div>`;
  if(isIOS)return`<div class="install-bar"><div style="font-size:24px">📱</div><div class="ib-info"><div class="ib-title">安裝到桌面</div><div class="ib-sub">Safari → 分享 → 加入主畫面</div></div><button class="ib-x" onclick="hideInstall()">✕</button></div>`;
  return'';
}

// ── Price Alerts ──
function saveAlerts(){SV('st-alerts',alerts)}
function addAlert2(sym,above,below){
  alerts.push({id:uid(),symbol:sym.toUpperCase(),above:above||null,below:below||null,triggered:false});
  saveAlerts();toast('🔔 提醒已設定');render();
}
function delAlert(id){alerts=alerts.filter(a=>a.id!==id);saveAlerts();render()}
function checkAlerts(){
  alerts.forEach(a=>{
    if(a.triggered)return;
    const p=prices[norm(a.symbol)]?.price;if(!p)return;
    let msg=null;
    if(a.above&&p>=a.above)msg=`🔔 ${a.symbol} 漲到 ${fmt(p)}！(設定 ${fmt(a.above)})`;
    if(a.below&&p<=a.below)msg=`🔔 ${a.symbol} 跌到 ${fmt(p)}！(設定 ${fmt(a.below)})`;
    if(msg){
      a.triggered=true;saveAlerts();
      toast(msg);
      if('Notification' in window&&Notification.permission==='granted'){new Notification('Stock Tracker',{body:msg,icon:'icon-192.png'})}
      else if('Notification' in window&&Notification.permission!=='denied'){Notification.requestPermission().then(p=>{if(p==='granted')new Notification('Stock Tracker',{body:msg})})}
    }
  });
}
function alertsHtml(sym){
  const myAlerts=alerts.filter(a=>a.symbol===sym.toUpperCase()&&!a.triggered);
  let h=`<div class="cd" style="padding:10px"><div style="font-size:11px;font-weight:700;margin-bottom:6px">🔔 到價提醒</div>
  <div style="display:flex;gap:4px;margin-bottom:6px"><input class="inp" id="alUp" type="number" placeholder="▲ 漲到" style="flex:1"><input class="inp" id="alDn" type="number" placeholder="▼ 跌到" style="flex:1"><button class="btn" style="background:var(--ac);color:#060b14;padding:8px 12px" onclick="doAddAlert('${sym}')">+</button></div>`;
  if(myAlerts.length)h+=myAlerts.map(a=>`<div style="display:flex;justify-content:space-between;align-items:center;padding:4px 0;font-size:10px;color:var(--t2)">${a.above?'▲'+fmt(a.above)+' ':''} ${a.below?'▼'+fmt(a.below):''}<button class="btn" style="color:var(--red);padding:2px 6px;font-size:10px" onclick="delAlert('${a.id}')">✕</button></div>`).join('');
  return h+'</div>';
}
function doAddAlert(sym){const a=document.getElementById('alUp')?.value,b=document.getElementById('alDn')?.value;if(a||b)addAlert2(sym,+a||null,+b||null)}

// Hook alert check into price updates
const _origFetchBatch=fetchBatch;
fetchBatch=async function(syms){await _origFetchBatch(syms);checkAlerts()};

// ── Service Worker ──
if('serviceWorker' in navigator){navigator.serviceWorker.register('sw.js').catch(()=>{})}

render();
startAuto();
</script>
